<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Building -->
    <rect x="100" y="100" width="400" height="250" rx="10" fill="#4A148C" fill-opacity="0.1"/>
    
    <!-- Windows -->
    <rect x="150" y="150" width="80" height="80" rx="5" fill="#4A148C" fill-opacity="0.2"/>
    <rect x="250" y="150" width="80" height="80" rx="5" fill="#4A148C" fill-opacity="0.2"/>
    <rect x="350" y="150" width="80" height="80" rx="5" fill="#4A148C" fill-opacity="0.2"/>
    
    <!-- Door -->
    <rect x="250" y="250" width="80" height="100" rx="5" fill="#4A148C" fill-opacity="0.3"/>
    
    <!-- People -->
    <circle cx="200" cy="300" r="15" fill="#4A148C"/>
    <circle cx="400" cy="300" r="15" fill="#4A148C"/>
    
    <!-- Charts -->
    <path d="M450 200 L500 200 L500 250 L450 250 Z" fill="#4A148C" fill-opacity="0.2"/>
    <path d="M450 200 L500 200 L500 150 L450 150 Z" fill="#4A148C" fill-opacity="0.3"/>
    
    <!-- Calendar -->
    <rect x="50" y="150" width="60" height="80" rx="5" fill="#4A148C" fill-opacity="0.2"/>
    <rect x="50" y="150" width="60" height="20" rx="5" fill="#4A148C" fill-opacity="0.3"/>
    
    <!-- Money -->
    <circle cx="550" cy="150" r="30" fill="#4A148C" fill-opacity="0.2"/>
    <text x="550" y="155" text-anchor="middle" fill="#4A148C" font-size="20">₹</text>
    
    <!-- Decorative Elements -->
    <circle cx="50" cy="50" r="20" fill="#4A148C" fill-opacity="0.1"/>
    <circle cx="550" cy="50" r="20" fill="#4A148C" fill-opacity="0.1"/>
    <circle cx="300" cy="50" r="30" fill="#4A148C" fill-opacity="0.1"/>
</svg> 